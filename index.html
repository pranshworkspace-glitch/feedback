<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NSS Shipping — Forms & Feedback</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --ink:#0B1F33; --ink2:#13314A; --ink3:#1E4663; --ink-line:#26506E;
  --paper:#F5F0E4; --paper2:#FBF8F0; --line:#DBD1BD; --line2:#E8E0CF;
  --brass:#E0A03A; --brass-d:#C2842A;
  --good:#2E7D6B; --good2:#5C9E64; --mid:#C68A1E; --warn:#D07A2A; --bad:#B14228;
  --t-dark:#10212F; --t-soft:#5E6E76; --t-mute:#8A97A0;
  --t-on:#EAF0F4; --t-on-soft:#9DB4C4;
  --display:'Fraunces',Georgia,serif; --ui:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;}
body{margin:0;background:#E7E0D0;font-family:var(--ui);color:var(--t-dark);line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1140px;margin:0 auto;padding:20px 16px;}
.shell{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 18px 50px -28px rgba(11,31,51,.5);}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--ink);color:var(--t-on);padding:14px 20px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:12px;}
.brand img{width:40px;height:40px;border-radius:9px;background:#fff;padding:3px;object-fit:contain;}
.brand b{font-family:var(--display);font-weight:600;font-size:16px;display:block;}
.brand span{font-size:11px;color:var(--t-on-soft);letter-spacing:.1em;text-transform:uppercase;}
.head-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--brass);background:rgba(224,160,58,.12);padding:5px 10px;border-radius:20px;border:1px solid rgba(224,160,58,.3);}
.ghost{background:transparent;color:var(--t-on-soft);border:1px solid var(--ink-line);padding:6px 11px;border-radius:8px;font-size:12px;cursor:pointer;}
.ghost:hover{color:var(--t-on);border-color:var(--brass);}
.body{display:flex;min-height:460px;}
.nav{flex:none;width:210px;background:var(--paper2);border-right:1px solid var(--line);padding:16px 12px;}
.nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:0;padding:10px 12px;border-radius:9px;font-size:14px;color:var(--t-soft);cursor:pointer;font-family:var(--ui);margin-bottom:3px;}
.nav button:hover{background:#fff;color:var(--ink);}
.nav button.on{background:var(--ink);color:#fff;font-weight:600;}
.nav button.on .dot{background:var(--brass);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex:none;}
.main{flex:1;padding:26px 28px;min-width:0;}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-d);font-weight:600;margin-bottom:8px;}
h1.t{font-family:var(--display);font-size:26px;font-weight:600;margin:0 0 6px;color:var(--ink);}
h2.t{font-family:var(--display);font-size:17px;font-weight:600;margin:0 0 12px;color:var(--ink);}
.lead{color:var(--t-soft);font-size:14px;margin:0 0 20px;max-width:60ch;}
.muted{color:var(--t-mute);font-size:13px;}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:24px;position:relative;}
.narrow{max-width:440px;margin:24px auto;}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 0;color:var(--t-mute);}
.spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--brass);border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.field{display:block;margin-bottom:15px;}
.flabel{display:block;font-size:12.5px;font-weight:600;color:var(--t-soft);margin-bottom:6px;}
.req{color:var(--bad);}
.input{width:100%;background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;font-family:var(--ui);color:var(--t-dark);}
.input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(224,160,58,.18);}
textarea.input{resize:vertical;line-height:1.5;}
.primary{background:var(--ink);color:#fff;border:0;padding:12px 18px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--ui);}
.primary:hover{background:var(--ink2);}
.primary:disabled{opacity:.55;cursor:not-allowed;}
.sec{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--ink);border:1px solid var(--line);padding:10px 15px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--ui);}
.sec:hover{border-color:var(--brass);}
.sec:disabled{opacity:.5;cursor:not-allowed;}
.linkbtn{background:none;border:0;color:var(--t-soft);cursor:pointer;font-size:13px;text-decoration:underline;text-underline-offset:3px;font-family:var(--ui);}
.err{display:flex;gap:7px;color:var(--bad);font-size:13px;margin:4px 0 12px;background:rgba(177,66,40,.07);padding:9px 12px;border-radius:8px;border:1px solid rgba(177,66,40,.2);}
.ok{color:var(--good);font-size:13px;margin:4px 0 12px;background:rgba(46,125,107,.08);padding:9px 12px;border-radius:8px;border:1px solid rgba(46,125,107,.25);}
.note{font-size:12.5px;color:var(--t-mute);margin-top:10px;}
/* form rendering */
.fhead{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:6px;}
.fhead img{width:54px;height:54px;object-fit:contain;background:#fff;border-radius:8px;padding:3px;}
.fhead .org{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink);}
.fhead .ti{font-size:13px;color:var(--t-soft);letter-spacing:.04em;}
.ffoot{margin-top:18px;padding-top:12px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--t-mute);}
.intro{font-size:13px;color:var(--t-soft);background:#fff;border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin:14px 0;}
.section{margin-top:22px;}
.section h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass-d);font-weight:600;border-bottom:1px solid var(--line);padding-bottom:6px;margin:0 0 14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}
.qrow{margin-bottom:16px;}
.qrow .ql{font-size:14px;margin-bottom:8px;display:flex;gap:8px;}
.qn{font-family:var(--mono);font-size:12px;color:var(--brass-d);flex:none;}
.rating{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:420px;}
.chip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-family:var(--ui);}
.chip:hover{border-color:var(--brass);}
.chip.on{background:var(--ink);border-color:var(--ink);}
.chip .n{font-family:var(--mono);font-size:15px;color:var(--ink);}
.chip.on .n{color:var(--brass);}
.chip .w{font-size:9px;letter-spacing:.02em;color:var(--t-mute);text-transform:uppercase;text-align:center;}
.chip.on .w{color:var(--t-on-soft);}
.rubric{font-size:12px;color:var(--t-soft);margin-top:6px;min-height:16px;font-style:italic;}
.yn{display:inline-flex;gap:8px;}
.yn button{padding:8px 20px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-size:14px;font-family:var(--ui);font-weight:600;color:var(--t-soft);}
.yn button.yes.on{background:var(--good);border-color:var(--good);color:#fff;}
.yn button.no.on{background:var(--bad);border-color:var(--bad);color:#fff;}
/* dashboard */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:var(--ink);color:#fff;border-radius:11px;padding:15px 16px;}
.stat .l{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--t-on-soft);}
.stat .v{font-family:var(--display);font-size:28px;font-weight:600;line-height:1.1;margin-top:4px;}
.panel{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.gauge{margin-bottom:13px;}
.gauge .gh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;gap:10px;}
.gv{font-family:var(--mono);flex:none;}
.track{height:8px;background:var(--line2);border-radius:5px;overflow:hidden;}
.fill{height:100%;border-radius:5px;}
.tbl{border:1px solid var(--line2);border-radius:10px;overflow:hidden;font-size:13.5px;}
.trow{display:grid;gap:10px;align-items:center;padding:10px 14px;}
.th{background:var(--ink);color:var(--t-on-soft);font-size:11px;letter-spacing:.06em;text-transform:uppercase;}
.td{background:#fff;border-top:1px solid var(--line2);cursor:pointer;width:100%;text-align:left;border-left:0;border-right:0;border-bottom:0;font-family:var(--ui);}
.td:hover{background:var(--paper2);}
.detail{background:var(--paper2);border-top:1px solid var(--line2);padding:14px 16px;font-size:13px;}
.detail .dr{display:grid;grid-template-columns:1fr auto;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);}
.pill{color:#fff;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
.formlist{display:flex;flex-direction:column;gap:10px;}
.formcard{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:15px 17px;cursor:pointer;text-align:left;width:100%;font-family:var(--ui);}
.formcard:hover{border-color:var(--brass);}
.formcard .fc-t{font-family:var(--display);font-size:15px;font-weight:600;color:var(--ink);}
.formcard .fc-s{font-size:12px;color:var(--t-mute);margin-top:2px;}
.tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:5px;background:var(--line2);color:var(--t-soft);font-weight:600;}
.copybox{display:flex;gap:8px;margin-top:10px;}
.copybox input{flex:1;font-family:var(--mono);font-size:12px;}
@media(max-width:760px){.body{flex-direction:column;}.nav{width:auto;display:flex;gap:6px;overflow-x:auto;border-right:0;border-bottom:1px solid var(--line);}.nav button{white-space:nowrap;margin:0;}.grid2{grid-template-columns:1fr;}.main{padding:20px 16px;}}
</style>
</head>
